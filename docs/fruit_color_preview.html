<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fruit Tile Color Preview</title>
<style>
  body { background: #1E1E2E; font-family: sans-serif; padding: 24px; color: #FAF7F2; }
  h2 { color: #E8D5A3; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; margin: 32px 0 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .label { font-size: 10px; color: #888; margin-top: 4px; }
  .tile {
    width: 90px; height: 90px; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; text-align: center; gap: 4px;
  }
  .dot { width: 20px; height: 20px; border-radius: 50%; }
</style>
</head>
<body>

<h1 style="font-size:18px;margin-bottom:4px;">Fruit Tile States — on Charcoal #1E1E2E</h1>
<p style="font-size:12px;color:#888;margin-bottom:4px;">Three states: Active (bg 18%, border 100%) · Dormant (bg 10%, border 60%) · Inactive (bg 6%, border 45%)</p>

<script>
const fruits = [
  { name: 'Love',         hex: '#C62828' },
  { name: 'Joy',          hex: '#F9A825' },
  { name: 'Peace',        hex: '#29B6F6' },
  { name: 'Patience',     hex: '#8D6E63' },
  { name: 'Kindness',     hex: '#FF7043' },
  { name: 'Goodness',     hex: '#2E7D32' },
  { name: 'Faithfulness', hex: '#283593' },
  { name: 'Gentleness',   hex: '#AB47BC' },
  { name: 'Self-control', hex: '#00695C' },
];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function rgba(hex, a) {
  const {r,g,b} = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

const states = [
  { label: 'Active',   bgAlpha: 0.60, borderAlpha: 1.0,  iconAlpha: 1.0,  borderWidth: '1.5px' },
  { label: 'Dormant',  bgAlpha: 0.38, borderAlpha: 0.85, iconAlpha: 1.0,  borderWidth: '1px' },
  { label: 'Inactive', bgAlpha: 0.22, borderAlpha: 0.60, iconAlpha: 0.80, borderWidth: '1px' },
];

for (const state of states) {
  document.write(`<h2>${state.label} — bg alpha ${state.bgAlpha}, border alpha ${state.borderAlpha}</h2>`);
  document.write('<div class="row">');
  for (const f of fruits) {
    const bg = rgba(f.hex, state.bgAlpha);
    const border = rgba(f.hex, state.borderAlpha);
    const icon = rgba(f.hex, state.iconAlpha);
    document.write(`
      <div>
        <div class="tile" style="background:${bg};border:${state.borderWidth} solid ${border};">
          <div class="dot" style="background:${icon};"></div>
          <span style="color:${icon};font-size:10px;">${f.name}</span>
        </div>
        <div class="label">${f.hex}</div>
      </div>
    `);
  }
  document.write('</div>');
}
</script>

</body>
</html>
