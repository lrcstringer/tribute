<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fruit Colors — MyWalk</title>
<style>
  body { background: #2A2A2A; font-family: system-ui, sans-serif; padding: 40px; }
  h2 { color: #F5F0E8; margin-bottom: 8px; }
  p { color: #999; font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 480px; }
  .tile {
    border-radius: 12px;
    padding: 20px 12px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .swatch { width: 28px; height: 28px; border-radius: 50%; margin-bottom: 4px; }
  .label { font-size: 13px; font-weight: 600; }
  .hex { font-size: 10px; opacity: 0.8; font-family: monospace; }
</style>
</head>
<body>
<h2>Fruit of the Spirit — Colors</h2>
<p>Shown on charcoal background</p>
<div class="grid">

  <div class="tile" style="background: #F0909820; border: 1.5px solid #F09098;">
    <div class="swatch" style="background: #F09098;"></div>
    <div class="label" style="color: #F09098;">Love</div>
    <div class="hex" style="color: #F09098;">#F09098</div>
  </div>

  <div class="tile" style="background: #F8BC5820; border: 1.5px solid #F8BC58;">
    <div class="swatch" style="background: #F8BC58;"></div>
    <div class="label" style="color: #F8BC58;">Joy</div>
    <div class="hex" style="color: #F8BC58;">#F8BC58</div>
  </div>

  <div class="tile" style="background: #78C0F020; border: 1.5px solid #78C0F0;">
    <div class="swatch" style="background: #78C0F0;"></div>
    <div class="label" style="color: #78C0F0;">Peace</div>
    <div class="hex" style="color: #78C0F0;">#78C0F0</div>
  </div>

  <div class="tile" style="background: #C0A0E020; border: 1.5px solid #C0A0E0;">
    <div class="swatch" style="background: #C0A0E0;"></div>
    <div class="label" style="color: #C0A0E0;">Patience</div>
    <div class="hex" style="color: #C0A0E0;">#C0A0E0</div>
  </div>

  <div class="tile" style="background: #70D8B820; border: 1.5px solid #70D8B8;">
    <div class="swatch" style="background: #70D8B8;"></div>
    <div class="label" style="color: #70D8B8;">Kindness</div>
    <div class="hex" style="color: #70D8B8;">#70D8B8</div>
  </div>

  <div class="tile" style="background: #98DC6820; border: 1.5px solid #98DC68;">
    <div class="swatch" style="background: #98DC68;"></div>
    <div class="label" style="color: #98DC68;">Goodness</div>
    <div class="hex" style="color: #98DC68;">#98DC68</div>
  </div>

  <div class="tile" style="background: #DEB87020; border: 1.5px solid #DEB870;">
    <div class="swatch" style="background: #DEB870;"></div>
    <div class="label" style="color: #DEB870;">Faithfulness</div>
    <div class="hex" style="color: #DEB870;">#DEB870</div>
  </div>

  <div class="tile" style="background: #88C4E020; border: 1.5px solid #88C4E0;">
    <div class="swatch" style="background: #88C4E0;"></div>
    <div class="label" style="color: #88C4E0;">Gentleness</div>
    <div class="hex" style="color: #88C4E0;">#88C4E0</div>
  </div>

  <div class="tile" style="background: #B4A8D020; border: 1.5px solid #B4A8D0;">
    <div class="swatch" style="background: #B4A8D0;"></div>
    <div class="label" style="color: #B4A8D0;">Self-Control</div>
    <div class="hex" style="color: #B4A8D0;">#B4A8D0</div>
  </div>

</div>
</body>
</html>
