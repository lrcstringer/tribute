name: mywalk
description: "MyWalk — A habit tracking app for your faith journey."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.0.0+2

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Shared preferences (UserDefaults equivalent — UI-only state)
  shared_preferences: ^2.3.2

  # HTTP client
  http: ^1.2.2

  # In-app purchases (native StoreKit / Play Billing)
  in_app_purchase: ^3.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3

  # Cryptography (nonce for Apple Sign In)
  crypto: ^3.0.3

  # Sign in
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.1

  # Push notifications
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.1.6

  # Date formatting
  intl: ^0.20.2

  # UUID generation
  uuid: ^4.5.1

  # Timezone (required by flutter_local_notifications for scheduling)
  timezone: ^0.9.4

  # System share sheet (invite links)
  share_plus: ^10.1.4

  # Add-to-calendar (circle events)
  add_2_calendar: ^3.0.0

  # Deep link handling (App Links / Universal Links / custom URL scheme)
  app_links: ^6.3.0

  # Open device settings screens (e.g. notification settings)
  app_settings: ^5.1.1

  # Custom fonts (DM Serif Display + Inter)
  google_fonts: ^6.2.1

  # Firebase Storage (journal media uploads)
  firebase_storage: ^12.3.7

  # Media: image picker (camera + gallery)
  image_picker: ^1.1.2

  # Media: audio recording
  record: ^6.2.0

  # Media: audio playback
  audioplayers: ^6.1.0

  # Runtime permission requests (camera, mic, photos)
  permission_handler: ^11.3.1

  # Network connectivity monitoring (offline upload queue)
  connectivity_plus: ^6.1.1

  # Local file paths for offline media storage
  path_provider: ^2.1.5

  # Smooth freehand stroke rendering (journal doodle)
  perfect_freehand: ^2.0.1
  flutter_quill: ^11.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Integration test runner (E2E tests)
  integration_test:
    sdk: flutter

  # Mocking framework — use mocktail, not mockito
  mocktail: ^1.0.4

  # In-memory Firestore for data-layer unit tests (cloud_firestore classes are sealed)
  fake_cloud_firestore: ^3.1.0

  flutter_lints: ^6.0.0

  # App icon generator — run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.3

  # Splash screen generator — run: dart run flutter_native_splash:create
  flutter_native_splash: ^2.4.4

# ── App icon configuration (flutter_launcher_icons) ──────────────────────────
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/the4toedone.png"
  # Android adaptive icon: black background + icon as foreground layer
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/the4toedone.png"
  # Remove platform web/windows/macos icons (not needed)
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ── Splash screen configuration (flutter_native_splash) ───────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  # Black background matches the app's dark theme
  color: "#000000"
  # Icon centred on the splash — shown at ~1/3 screen height
  image: "assets/the4toedone.png"
  # Android 12+ uses the new SplashScreen API
  android_12:
    color: "#000000"
    image: "assets/the4toedone.png"
    icon_background_color: "#000000"
  # Keep splash visible until Flutter signals it's ready
  android_gravity: center
  ios_content_mode: center
  fullscreen: false

# ── Flutter section ───────────────────────────────────────────────────────────
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
    - assets/beatitudes_golden_etched_separate/
    - assets/circles/
    - assets/parables/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
